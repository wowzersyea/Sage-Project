name: Security Scan

on:
  pull_request:
  schedule:
    - cron: "30 10 * * 1"

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Basic secret scan
        run: |
          if grep -R -n -E "(sk-[A-Za-z0-9]{20,}|AIza[0-9A-Za-z\\-_]{20,}|BEGIN PRIVATE KEY)" . \
            --exclude-dir=.git --exclude-dir=node_modules; then
            echo "Potential secret detected"
            exit 1
          fi
          echo "No obvious secrets detected"
